<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a4a4a" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="#f9fafb" />
  <text x="600" y="40" font-size="24" font-weight="700" text-anchor="middle" fill="#1f2937">AgriLens High-Level Architecture</text>

  <g filter="url(#shadow)">
    <rect x="70" y="90" width="320" height="160" rx="18" ry="18" fill="#ffffff" stroke="#2563eb" stroke-width="3" />
    <text x="230" y="130" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle">Mobile App</text>
    <text x="230" y="160" font-size="14" fill="#4b5563" text-anchor="middle">Flutter client</text>
    <text x="230" y="180" font-size="14" fill="#4b5563" text-anchor="middle">Camera, upload, map</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="390" y="270" width="420" height="240" rx="18" ry="18" fill="#ffffff" stroke="#0f766e" stroke-width="3" />
    <text x="600" y="310" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle">Backend API</text>
    <text x="600" y="340" font-size="14" fill="#4b5563" text-anchor="middle">Flask central service</text>
    <text x="600" y="360" font-size="14" fill="#4b5563" text-anchor="middle">Auth, uploads, farm management</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="880" y="90" width="240" height="160" rx="18" ry="18" fill="#ffffff" stroke="#9333ea" stroke-width="3" />
    <text x="1000" y="130" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle">Notification Service</text>
    <text x="1000" y="160" font-size="14" fill="#4b5563" text-anchor="middle">Flask alerts</text>
    <text x="1000" y="180" font-size="14" fill="#4b5563" text-anchor="middle">FCM / Twilio</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="520" width="320" height="180" rx="18" ry="18" fill="#ffffff" stroke="#dc2626" stroke-width="3" />
    <text x="280" y="560" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle">Detection Service</text>
    <text x="280" y="590" font-size="14" fill="#4b5563" text-anchor="middle">Flask + ML</text>
    <text x="280" y="610" font-size="14" fill="#4b5563" text-anchor="middle">Crop disease detection</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="460" y="520" width="320" height="180" rx="18" ry="18" fill="#ffffff" stroke="#f59e0b" stroke-width="3" />
    <text x="620" y="560" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle">Forecast Service</text>
    <text x="620" y="590" font-size="14" fill="#4b5563" text-anchor="middle">Flask + ML</text>
    <text x="620" y="610" font-size="14" fill="#4b5563" text-anchor="middle">Disease spread forecasting</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="800" y="520" width="320" height="180" rx="18" ry="18" fill="#ffffff" stroke="#047857" stroke-width="3" />
    <text x="960" y="560" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle">Infrastructure</text>
    <text x="960" y="590" font-size="14" fill="#4b5563" text-anchor="middle">MongoDB, Redis, RabbitMQ</text>
    <text x="960" y="610" font-size="14" fill="#4b5563" text-anchor="middle">Firebase/FCM, Twilio, Cloudinary</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="390" y="100" width="420" height="120" rx="18" ry="18" fill="none" stroke="#94a3b8" stroke-dasharray="8 6" stroke-width="2" />
    <text x="600" y="80" font-size="16" font-weight="600" fill="#475569" text-anchor="middle">Core service boundary</text>
  </g>

  <line x1="200" y1="180" x2="390" y2="330" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="295" y="225" font-size="14" fill="#1f2937" text-anchor="middle">REST / HTTP</text>

  <line x1="710" y1="330" x2="880" y2="180" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="795" y="245" font-size="14" fill="#1f2937" text-anchor="middle">Publish events</text>

  <line x1="520" y1="430" x2="520" y2="520" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="550" y="470" font-size="14" fill="#1f2937" text-anchor="start">HTTP / API</text>

  <line x1="760" y1="430" x2="760" y2="520" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="790" y="470" font-size="14" fill="#1f2937" text-anchor="start">HTTP / API</text>

  <line x1="720" y1="640" x2="800" y2="640" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="760" y="660" font-size="14" fill="#1f2937" text-anchor="middle">Queue events</text>

  <line x1="1000" y1="250" x2="1000" y2="360" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1020" y="310" font-size="14" fill="#1f2937" text-anchor="start">Push/SMS</text>

  <line x1="980" y1="700" x2="980" y2="720" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="980" y="740" font-size="14" fill="#1f2937" text-anchor="middle">External services</text>

  <g>
    <rect x="900" y="740" width="200" height="40" rx="12" ry="12" fill="#e2e8f0" />
    <text x="1000" y="765" font-size="14" fill="#334155" text-anchor="middle">Docker Compose</text>
  </g>
</svg>