<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriLens Admin — Audit Logs</title>
<link rel="stylesheet" href="_layout.css">
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo"><h1>🌿 AgriLens</h1><p>Admin Panel</p></div>
  <div class="nav">
    <a class="nav-link" href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
    <a class="nav-link" href="users.html"><span class="icon">👥</span> Users</a>
    <a class="nav-link" href="scans.html"><span class="icon">🔬</span> Scans</a>
    <a class="nav-link" href="articles.html"><span class="icon">📰</span> Articles</a>
    <a class="nav-link" href="notifications.html"><span class="icon">🔔</span> Broadcast</a>
    <a class="nav-link" href="audit.html"><span class="icon">📋</span> Audit Logs</a>
  </div>
  <div class="sidebar-footer">
    <span id="admin-name"></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="main">
  <div class="topbar">Audit Logs</div>
  <div class="content">
    <div class="table-card">
      <div class="table-header"><h2 id="total-label">Audit Logs</h2></div>
      <table>
        <thead>
          <tr><th>Timestamp</th><th>User ID</th><th>Action</th><th>IP</th></tr>
        </thead>
        <tbody id="logs-body"></tbody>
      </table>
      <div class="pagination">
        <button class="page-btn" id="prev-btn" onclick="load(page-1)">← Prev</button>
        <button class="page-btn" id="next-btn" onclick="load(page+1)">Next →</button>
        <span class="page-info" id="page-info"></span>
      </div>
    </div>
  </div>
</div>

<script src="_base.js"></script>
<script>
let page = 1;

async function load(p = 1) {
  page = p;
  const r = await apiFetch(`/api/admin/audit-logs?page=${page}&per_page=50`);
  if (!r) return;
  const { data } = await r.json();
  if (!data) return;

  document.getElementById('total-label').textContent = `Audit Logs (${data.total})`;
  document.getElementById('page-info').textContent   = `Page ${data.page} of ${data.pages}`;
  document.getElementById('prev-btn').disabled = data.page <= 1;
  document.getElementById('next-btn').disabled = data.page >= data.pages;

  const tbody = document.getElementById('logs-body');
  if (!data.logs.length) { tbody.innerHTML = '<tr><td colspan="4" class="empty">No logs yet</td></tr>'; return; }

  tbody.innerHTML = data.logs.map(l => `
    <tr>
      <td style="font-size:12px">${fmtDatetime(l.timestamp)}</td>
      <td style="font-size:11px;color:#aaa">${l.user_id}</td>
      <td>${l.action}</td>
      <td style="font-size:12px;color:#aaa">${l.ip_address || '—'}</td>
    </tr>
  `).join('');
}

load();
</script>
</body>
</html>
