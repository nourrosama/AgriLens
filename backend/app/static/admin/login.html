<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriLens Admin — Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); padding: 48px 40px; width: 380px; }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo h1 { color: #2e7d32; font-size: 28px; font-weight: 700; }
  .logo p { color: #666; font-size: 14px; margin-top: 4px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
  input { width: 100%; padding: 11px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; transition: border-color .2s; }
  input:focus { border-color: #2e7d32; }
  .btn { width: 100%; padding: 12px; background: #2e7d32; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: background .2s; }
  .btn:hover { background: #1b5e20; }
  .btn:disabled { background: #a5d6a7; cursor: not-allowed; }
  .error { color: #c62828; font-size: 13px; margin-top: 10px; text-align: center; min-height: 18px; }
  .field { margin-bottom: 18px; }
  #step2 { display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🌿 AgriLens</h1>
    <p>Admin Dashboard</p>
  </div>

  <div id="step1">
    <div class="field">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="+20XXXXXXXXXX">
    </div>
    <button class="btn" id="sendBtn" onclick="sendOtp()">Send OTP</button>
    <p class="error" id="err1"></p>
  </div>

  <div id="step2">
    <div class="field">
      <label>OTP Code</label>
      <input type="text" id="otp" placeholder="Enter 6-digit code" maxlength="6">
    </div>
    <button class="btn" id="verifyBtn" onclick="verifyOtp()">Verify & Login</button>
    <button class="btn" style="background:#fff;color:#2e7d32;border:1.5px solid #2e7d32;margin-top:8px" onclick="back()">← Back</button>
    <p class="error" id="err2"></p>
  </div>
</div>

<script>
  const API = '';
  let _phone = '';

  if (localStorage.getItem('admin_token')) window.location.href = '/admin/dashboard.html';

  function setErr(id, msg) { document.getElementById(id).textContent = msg; }
  function setLoading(btn, loading) {
    document.getElementById(btn).disabled = loading;
    document.getElementById(btn).textContent = loading ? 'Please wait...' : (btn === 'sendBtn' ? 'Send OTP' : 'Verify & Login');
  }

  async function sendOtp() {
    const phone = document.getElementById('phone').value.trim();
    setErr('err1', '');
    if (!phone) return setErr('err1', 'Enter your phone number.');
    setLoading('sendBtn', true);
    try {
      const r = await fetch(`${API}/api/auth/send-otp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone }),
      });
      const d = await r.json();
      if (!r.ok) return setErr('err1', d.message || 'Failed to send OTP.');
      _phone = phone;
      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'block';
    } catch { setErr('err1', 'Network error. Is the server running?'); }
    finally { setLoading('sendBtn', false); }
  }

  async function verifyOtp() {
    const code = document.getElementById('otp').value.trim();
    setErr('err2', '');
    if (!code) return setErr('err2', 'Enter the OTP code.');
    setLoading('verifyBtn', true);
    try {
      const r = await fetch(`${API}/api/auth/verify-otp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone: _phone, code }),
      });
      const d = await r.json();
      if (!r.ok) return setErr('err2', d.message || 'Invalid OTP.');
      const user = d.data?.user;
      if (user?.role !== 'admin') return setErr('err2', 'Access denied. Admin accounts only.');
      localStorage.setItem('admin_token', d.data.token);
      localStorage.setItem('admin_user', JSON.stringify(user));
      window.location.href = '/admin/dashboard.html';
    } catch { setErr('err2', 'Network error.'); }
    finally { setLoading('verifyBtn', false); }
  }

  function back() {
    document.getElementById('step2').style.display = 'none';
    document.getElementById('step1').style.display = 'block';
    setErr('err2', '');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('step2').style.display === 'block') verifyOtp();
      else sendOtp();
    }
  });
</script>
</body>
</html>
