<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriLens Admin — Scans</title>
<link rel="stylesheet" href="_layout.css">
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo"><h1>🌿 AgriLens</h1><p>Admin Panel</p></div>
  <div class="nav">
    <a class="nav-link" href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
    <a class="nav-link" href="users.html"><span class="icon">👥</span> Users</a>
    <a class="nav-link" href="scans.html"><span class="icon">🔬</span> Scans</a>
    <a class="nav-link" href="articles.html"><span class="icon">📰</span> Articles</a>
    <a class="nav-link" href="notifications.html"><span class="icon">🔔</span> Broadcast</a>
    <a class="nav-link" href="support.html"><span class="icon">💬</span> Support</a>
    <a class="nav-link" href="audit.html"><span class="icon">📋</span> Audit Logs</a>
  </div>
</nav>

<div class="main">
  <div class="topbar">Scans</div>
  <div class="content">
    <div class="table-card">
      <div class="table-header">
        <h2 id="total-label">All Scans</h2>
        <div class="search-bar">
          <select id="status-filter" onchange="load(1)">
            <option value="">All statuses</option>
            <option value="completed">Completed</option>
            <option value="pending">Pending</option>
            <option value="processing">Processing</option>
            <option value="failed">Failed</option>
          </select>
        </div>
      </div>
      <table>
        <thead>
          <tr><th>Date</th><th>Crop</th><th>Status</th><th>Disease</th><th>Severity</th><th>User ID</th></tr>
        </thead>
        <tbody id="scans-body"></tbody>
      </table>
      <div class="pagination">
        <button class="page-btn" id="prev-btn" onclick="load(page-1)">← Prev</button>
        <button class="page-btn" id="next-btn" onclick="load(page+1)">Next →</button>
        <span class="page-info" id="page-info"></span>
      </div>
    </div>
  </div>
</div>

<script src="_base.js"></script>
<script>
let page = 1;

function statusBadge(s) {
  const map = { completed: 'green', failed: 'red', pending: 'orange', processing: 'blue' };
  return badge(s, map[s] || 'grey');
}

async function load(p = 1) {
  page = p;
  const status = document.getElementById('status-filter').value;
  let url = `/api/admin/scans?page=${page}&per_page=20`;
  if (status) url += `&status=${status}`;

  const r = await apiFetch(url);
  if (!r) return;
  const { data } = await r.json();
  if (!data) return;

  document.getElementById('total-label').textContent = `All Scans (${data.total})`;
  document.getElementById('page-info').textContent   = `Page ${data.page} of ${data.pages}`;
  document.getElementById('prev-btn').disabled = data.page <= 1;
  document.getElementById('next-btn').disabled = data.page >= data.pages;

  const tbody = document.getElementById('scans-body');
  if (!data.scans.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">No scans found</td></tr>'; return; }

  tbody.innerHTML = data.scans.map(s => {
    const det = s.detection_result || {};
    return `<tr>
      <td>${fmtDatetime(s.created_at)}</td>
      <td>${s.crop_type || '—'}</td>
      <td>${statusBadge(s.status)}</td>
      <td>${det.disease_name || '—'}</td>
      <td>${det.severity ? badge(det.severity, det.severity === 'high' || det.severity === 'critical' ? 'red' : det.severity === 'medium' ? 'orange' : 'green') : '—'}</td>
      <td style="font-size:11px;color:#aaa">${s.user_id || '—'}</td>
    </tr>`;
  }).join('');
}

load();
</script>
</body>
</html>
