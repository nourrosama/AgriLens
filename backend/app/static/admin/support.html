<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriLens Admin — Support</title>
<link rel="stylesheet" href="_layout.css">
<style>
  .ticket-list { display:flex; flex-direction:column; gap:12px; }
  .ticket-row {
    background:#fff; border:1px solid #e0e0e0; border-radius:10px;
    padding:16px 20px; cursor:pointer; transition:box-shadow .15s;
    display:flex; justify-content:space-between; align-items:center;
  }
  .ticket-row:hover { box-shadow:0 2px 10px rgba(0,0,0,.1); }
  .ticket-row.active { border-color:#2e7d32; box-shadow:0 0 0 2px #c8e6c9; }
  .ticket-meta { font-size:12px; color:#9e9e9e; margin-top:4px; }
  .badge {
    display:inline-block; padding:3px 10px; border-radius:99px; font-size:11px; font-weight:600;
  }
  .badge.open     { background:#e8f5e9; color:#2e7d32; }
  .badge.replied  { background:#e3f2fd; color:#1565c0; }
  .badge.closed   { background:#f5f5f5; color:#757575; }

  .detail-panel {
    background:#fff; border:1px solid #e0e0e0; border-radius:12px;
    padding:24px; display:none; flex-direction:column; gap:16px;
  }
  .detail-panel.visible { display:flex; }

  .msg-thread { display:flex; flex-direction:column; gap:10px; max-height:340px; overflow-y:auto; }
  .msg-bubble {
    max-width:75%; padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.5;
  }
  .msg-bubble.user  { background:#e8f5e9; align-self:flex-end; border-bottom-right-radius:4px; }
  .msg-bubble.admin { background:#e3f2fd; align-self:flex-start; border-bottom-left-radius:4px; }
  .msg-meta { font-size:11px; color:#9e9e9e; margin-top:3px; }
  .msg-right { align-self:flex-end; text-align:right; }
  .msg-left  { align-self:flex-start; }

  .reply-box { display:flex; gap:10px; margin-top:8px; }
  .reply-box textarea {
    flex:1; resize:vertical; min-height:70px;
    border:1px solid #ddd; border-radius:8px; padding:10px; font-size:14px;
  }
  .reply-box textarea:focus { outline:none; border-color:#2e7d32; }

  .filter-bar { display:flex; gap:8px; margin-bottom:16px; }
  .filter-btn {
    padding:6px 14px; border-radius:99px; border:1px solid #ddd;
    background:#fff; cursor:pointer; font-size:13px;
  }
  .filter-btn.active { background:#2e7d32; color:#fff; border-color:#2e7d32; }

  .split { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media(max-width:900px){ .split{ grid-template-columns:1fr; } }
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo"><h1>🌿 AgriLens</h1><p>Admin Panel</p></div>
  <div class="nav">
    <a class="nav-link" href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
    <a class="nav-link" href="users.html"><span class="icon">👥</span> Users</a>
    <a class="nav-link" href="scans.html"><span class="icon">🔬</span> Scans</a>
    <a class="nav-link" href="articles.html"><span class="icon">📰</span> Articles</a>
    <a class="nav-link" href="notifications.html"><span class="icon">🔔</span> Broadcast</a>
    <a class="nav-link active" href="support.html"><span class="icon">💬</span> Support</a>
    <a class="nav-link" href="audit.html"><span class="icon">📋</span> Audit Logs</a>
  </div>
</nav>

<div class="main">
  <div class="topbar">Support Tickets</div>
  <div class="content">

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('')">All</button>
      <button class="filter-btn" onclick="setFilter('open')">Open</button>
      <button class="filter-btn" onclick="setFilter('replied')">Replied</button>
      <button class="filter-btn" onclick="setFilter('closed')">Closed</button>
    </div>

    <div class="split">
      <!-- LEFT: ticket list -->
      <div>
        <div class="ticket-list" id="ticket-list">
          <p style="color:#9e9e9e">Loading…</p>
        </div>
      </div>

      <!-- RIGHT: conversation detail -->
      <div>
        <div class="detail-panel" id="detail-panel">
          <div>
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
              <div>
                <div style="font-weight:700;font-size:17px" id="det-subject"></div>
                <div class="ticket-meta" id="det-meta"></div>
              </div>
              <div style="display:flex;gap:8px;align-items:center">
                <span class="badge" id="det-badge"></span>
                <button class="btn-secondary" id="close-btn" onclick="toggleClose()">Close ticket</button>
              </div>
            </div>
          </div>

          <div class="msg-thread" id="msg-thread"></div>

          <div class="reply-box">
            <textarea id="reply-text" placeholder="Type your reply…"></textarea>
            <button class="btn-primary" style="align-self:flex-end" onclick="sendReply()">Send</button>
          </div>
        </div>
        <div id="no-selection" style="color:#9e9e9e;padding:20px">
          Select a ticket to view the conversation.
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="_base.js"></script>
<script>
let tickets = [];
let activeId = null;
let currentFilter = '';

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderList();
}

async function loadTickets() {
  const url = '/api/admin/support/tickets' + (currentFilter ? `?status=${currentFilter}` : '');
  const r = await apiFetch(url);
  if (!r) return;
  const d = await r.json();
  if (!r.ok) return showToast(d.message || 'Error', 'error');
  tickets = d.data.tickets || [];
  renderList();
  if (activeId) {
    const t = tickets.find(x => x.id === activeId);
    if (t) renderDetail(t);
  }
}

function renderList() {
  const list = document.getElementById('ticket-list');
  const filtered = currentFilter ? tickets.filter(t => t.status === currentFilter) : tickets;
  if (!filtered.length) { list.innerHTML = '<p style="color:#9e9e9e">No tickets found.</p>'; return; }

  list.innerHTML = filtered.map(t => `
    <div class="ticket-row ${t.id === activeId ? 'active' : ''}" onclick="selectTicket('${t.id}')">
      <div>
        <div style="font-weight:600">${escHtml(t.subject)}</div>
        <div class="ticket-meta">
          ${escHtml(t.user_name)} · ${escHtml(t.user_email)}<br>
          ${fmtDate(t.updated_at)}
        </div>
      </div>
      <span class="badge ${t.status}">${t.status}</span>
    </div>
  `).join('');
}

function selectTicket(id) {
  activeId = id;
  const t = tickets.find(x => x.id === id);
  if (t) renderDetail(t);
  document.querySelectorAll('.ticket-row').forEach(r => r.classList.remove('active'));
  const rows = document.querySelectorAll('.ticket-row');
  rows.forEach(r => { if (r.onclick.toString().includes(`'${id}'`)) r.classList.add('active'); });
  renderList();
  renderDetail(t);
}

function renderDetail(ticket) {
  document.getElementById('no-selection').style.display = 'none';
  const panel = document.getElementById('detail-panel');
  panel.classList.add('visible');

  document.getElementById('det-subject').textContent = ticket.subject;
  document.getElementById('det-meta').textContent =
    `${ticket.user_name} (${ticket.user_email}) · Opened ${fmtDate(ticket.created_at)}`;

  const badge = document.getElementById('det-badge');
  badge.textContent = ticket.status;
  badge.className = `badge ${ticket.status}`;

  const closeBtn = document.getElementById('close-btn');
  closeBtn.textContent = ticket.status === 'closed' ? 'Reopen ticket' : 'Close ticket';

  const thread = document.getElementById('msg-thread');
  thread.innerHTML = (ticket.messages || []).map(m => {
    const isUser = m.sender === 'user';
    return `
      <div class="${isUser ? 'msg-right' : 'msg-left'}">
        <div class="msg-bubble ${m.sender}">${escHtml(m.text)}</div>
        <div class="msg-meta">${escHtml(m.sender_name)} · ${fmtDate(m.created_at)}</div>
      </div>
    `;
  }).join('');
  thread.scrollTop = thread.scrollHeight;
}

async function sendReply() {
  if (!activeId) return;
  const text = document.getElementById('reply-text').value.trim();
  if (!text) return showToast('Reply cannot be empty', 'error');

  const r = await apiFetch(`/api/admin/support/tickets/${activeId}/reply`, {
    method: 'POST',
    body: JSON.stringify({ message: text }),
  });
  if (!r) return;
  const d = await r.json();
  if (!r.ok) return showToast(d.message || 'Error', 'error');

  document.getElementById('reply-text').value = '';
  showToast('Reply sent');
  const idx = tickets.findIndex(t => t.id === activeId);
  if (idx >= 0) tickets[idx] = d.data.ticket;
  renderList();
  renderDetail(d.data.ticket);
}

async function toggleClose() {
  if (!activeId) return;
  const ticket = tickets.find(t => t.id === activeId);
  if (!ticket) return;
  const newStatus = ticket.status === 'closed' ? 'open' : 'closed';

  const r = await apiFetch(`/api/admin/support/tickets/${activeId}/status`, {
    method: 'PUT',
    body: JSON.stringify({ status: newStatus }),
  });
  if (!r) return;
  const d = await r.json();
  if (!r.ok) return showToast(d.message || 'Error', 'error');

  showToast(`Ticket ${newStatus}`);
  const idx = tickets.findIndex(t => t.id === activeId);
  if (idx >= 0) tickets[idx] = d.data.ticket;
  renderList();
  renderDetail(d.data.ticket);
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function escHtml(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadTickets();
setInterval(loadTickets, 30000); // auto-refresh every 30 s
</script>
</body>
</html>
