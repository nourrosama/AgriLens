[pytest]
# AgriLens backend test configuration
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = backend/tests

# Markers for categorizing tests
markers =
    auth: Authentication and OTP endpoints
    crud: Create, Read, Update, Delete operations
    api: API endpoint tests
    events: Event publisher and RabbitMQ integration
    services: Business logic service tests
    offline: Offline queue and sync tests
    integration: Multi-component integration tests
    slow: Tests that take significant time

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Coverage options
[coverage:run]
source = app
omit =
    app/config/*
    app/__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
