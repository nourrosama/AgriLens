limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=scan:10m rate=5r/m;

# Docker's embedded DNS server. Using a variable in proxy_pass makes nginx
# re-resolve the backend container name instead of pinning the IP at startup.
resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

server {
    listen 80;
    server_name _;

    set $agrilens_backend http://backend:5000;

    client_max_body_size 100M;
    proxy_connect_timeout 30s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /api/health {
        proxy_pass $agrilens_backend;
    }

    location ^~ /api/scans {
        limit_req zone=scan burst=3 nodelay;
        proxy_pass $agrilens_backend;
    }

    location ^~ /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_read_timeout 120s;
        proxy_pass $agrilens_backend;
    }

    location / {
        proxy_pass $agrilens_backend;
    }
}
