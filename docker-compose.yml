# AgriLens — Docker Compose
# Orchestrates all microservices for local development

services:
  # ── Backend API ──────────────────────────────
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - rabbitmq
      - redis
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads

  # ── Detection Service ────────────────────────
  detection-service:
    build: ./detection-service
    ports:
      - "5001:5001"
    volumes:
      - ./detection-service:/app

  # ── Forecast Service ─────────────────────────
  forecast-service:
    build: ./forecast-service
    ports:
      - "5002:5002"
    depends_on:
      - mongodb
    volumes:
      - ./forecast-service:/app

  # ── Notification Service ─────────────────────
  notification-service:
    build: ./notification-service
    ports:
      - "5003:5003"
    depends_on:
      - rabbitmq
    volumes:
      - ./notification-service:/app

  # ── MongoDB ──────────────────────────────────
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # ── RabbitMQ (Observer Pattern message broker) ─
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672" # AMQP protocol
      - "15672:15672" # Management UI (http://localhost:15672)

  # ── Redis (Caching) ─────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mongo_data:
  backend_uploads:
