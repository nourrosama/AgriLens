# AgriLens Docker Compose
# Staging-oriented stack for the mobile demo.

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  backend:
    build: ./backend
    expose:
      - "5000"
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: ${APP_ENV:-demo}
      MONGO_URI: mongodb://mongodb:27017/agrilens
      DETECTION_SERVICE_URL: http://detection-service:5001
      DETECTION_CONNECT_TIMEOUT: "5"
      DETECTION_REQUEST_TIMEOUT: "120"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      MEDIA_STORAGE_PROVIDER: ${MEDIA_STORAGE_PROVIDER:-cloudinary}
      TWILIO_MOCK_MODE: ${TWILIO_MOCK_MODE:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      VIDEO_KEYFRAME_MODEL_ENABLED: "false"
      VIDEO_KEYFRAME_TARGET_FPS: "10"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      detection-service:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./secrets:/app/secrets:ro
      - backend_uploads:/app/uploads

  detection-service:
    build: ./detection-service
    expose:
      - "5001"
    environment:
      # S3 model download (set these in backend/.env on the server)
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_S3_PREFIX: ${AWS_S3_PREFIX:-models}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      # Azure fallback (set MODEL_BASE_URL if using Azure Blob)
      MODEL_BASE_URL: ${MODEL_BASE_URL:-}
      MODEL_PATH: /models/tomato_model.pth
      TOMATO_MODEL_PATH: /models/tomato_model.pth
      POTATO_MODEL_PATH: /models/potato_model.pth
      APPLE_MODEL_PATH: /models/apple_model.pth
      GRAPE_MODEL_PATH: /models/grape_effb3_best.pth
      WHEAT_MODEL_PATH: /models/wheat_disease_detector.pth
      CORN_MODEL_PATH: /models/corn_model.pth
      CORN_LABELS_PATH: /models/corn_labels.json
      SUGARCANE_MODEL_PATH: /models/sugarcane_model.pt
      SUGARCANE_LABELS_PATH: /models/sugarcane_labels.json
      COTTON_MODEL_PATH: /models/cotton_model.keras
      COTTON_TFLITE_MODEL_PATH: /models/cotton_model.tflite
      COTTON_LABELS_PATH: /models/cotton_label_mapping.json
      CROP_VALIDATOR_MODEL_PATH: /models/crop_validator.pt
      CROP_VALIDATOR_LABELS_PATH: /models/crop_validator_labels.json
      CROP_VALIDATOR_ENABLED: "false"
      CROP_VALIDATOR_NOT_PLANT_THRESHOLD: "0.35"
      CROP_VALIDATOR_SUPPORTED_THRESHOLD: "0.65"
      MIN_PLANT_CONFIDENCE: "0.40"
      VIDEO_MODEL_PATH: /models/video_model_tl.pth
      VIDEO_KEYFRAME_TARGET_FPS: "10"
      VIDEO_KEYFRAME_WINDOW: "64"
      VIDEO_KEYFRAME_STRIDE: "32"
      VIDEO_KEYFRAME_THRESHOLD: "0.5"
      VIDEO_KEYFRAME_MIN_DISTANCE: "5"
      VIDEO_KEYFRAME_MAX_SOURCE_FRAMES: "600"
      VIDEO_KEYFRAME_MAX_SELECTED: "20"
      MODEL_FORCE_CPU: "true"
    volumes:
      - ./detection-service:/app
      - ./models:/models

  notification-service:
    build: ./notification-service
    expose:
      - "5003"
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: mongodb://mongodb:27017/agrilens
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      FIREBASE_CREDENTIALS_PATH: /app/secrets/firebase-service-account.json
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./notification-service:/app
      - ./secrets:/app/secrets:ro

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_ERLANG_COOKIE: "agrilens-dev-cookie"
      # Raise the memory threshold so RabbitMQ doesn't fire a high-watermark
      # alarm on a dev machine with limited RAM.  0.6 = 60 % of total RAM.
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit vm_memory_high_watermark 0.6"
    tmpfs:
      - /var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/5672'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/27017'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Observability stack ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./deployment/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      - backend

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    volumes:
      - ./deployment/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    entrypoint:
      - sh
      - -c
      - "mkdir -p /loki/chunks /loki/rules /loki/tsdb-shipper-active /loki/tsdb-shipper-cache && /usr/bin/loki -config.file=/etc/loki/local-config.yaml"

  promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: agrilens2025
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployment/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki

volumes:
  backend_uploads:
  mongo_data:
  prometheus_data:
  loki_data:
  grafana_data:
