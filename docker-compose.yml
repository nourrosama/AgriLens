# AgriLens Docker Compose
# Local development stack for the mobile demo.

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: mongodb://mongodb:27017/agrilens
      DETECTION_SERVICE_URL: http://detection-service:5001
      DETECTION_CONNECT_TIMEOUT: "5"
      DETECTION_REQUEST_TIMEOUT: "120"
      FORECAST_SERVICE_URL: http://forecast-service:5002
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      detection-service:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./secrets:/app/secrets:ro
      - backend_uploads:/app/uploads

  detection-service:
    build: ./detection-service
    ports:
      - "5001:5001"
    environment:
      MODEL_PATH: /models/tomato_model.pth
      TOMATO_MODEL_PATH: /models/tomato_model.pth
      POTATO_MODEL_PATH: /models/potato_model.pth
      APPLE_MODEL_PATH: /models/apple_model.pth
      GRAPE_MODEL_PATH: /models/grape_effb3_best.pth
      WHEAT_MODEL_PATH: /models/wheat_disease_detector.pth
      MUSHROOM_MODEL_PATH: /models/mushroom_disease_classifier.pth
      MODEL_FORCE_CPU: "true"
    volumes:
      - ./detection-service:/app
      - ./models:/models:ro

  forecast-service:
    build: ./forecast-service
    ports:
      - "5002:5002"
    volumes:
      - ./forecast-service:/app

  notification-service:
    build: ./notification-service
    ports:
      - "5003:5003"
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: mongodb://mongodb:27017/agrilens
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      FIREBASE_CREDENTIALS_PATH: /app/secrets/firebase-service-account.json
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./notification-service:/app
      - ./secrets:/app/secrets:ro

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_ERLANG_COOKIE: "agrilens-dev-cookie"
      # Raise the memory threshold so RabbitMQ doesn't fire a high-watermark
      # alarm on a dev machine with limited RAM.  0.6 = 60 % of total RAM.
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit vm_memory_high_watermark 0.6"
    tmpfs:
      - /var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/5672'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/27017'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  backend_uploads:
  mongo_data:
