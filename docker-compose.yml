# AgriLens Docker Compose
# Local development stack for the mobile demo.

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      DETECTION_SERVICE_URL: http://detection-service:5001
      FORECAST_SERVICE_URL: http://forecast-service:5002
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - rabbitmq
      - redis
      - detection-service
    volumes:
      - ./backend:/app
      - ./secrets:/app/secrets:ro
      - backend_uploads:/app/uploads

  detection-service:
    build: ./detection-service
    ports:
      - "5001:5001"
    environment:
      MODEL_PATH: /models/tomato_model.pth
      MODEL_FORCE_CPU: "true"
    volumes:
      - ./detection-service:/app
      - ./models:/models:ro

  forecast-service:
    build: ./forecast-service
    ports:
      - "5002:5002"
    volumes:
      - ./forecast-service:/app

  notification-service:
    build: ./notification-service
    ports:
      - "5003:5003"
    env_file:
      - ./backend/.env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      FIREBASE_CREDENTIALS_PATH: /app/secrets/firebase-service-account.json
    depends_on:
      - rabbitmq
    volumes:
      - ./notification-service:/app
      - ./secrets:/app/secrets:ro

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:7
    profiles:
      - local-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro

volumes:
  backend_uploads:
  mongo_data:
