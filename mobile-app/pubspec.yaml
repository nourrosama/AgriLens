name: agrilens
description: "AgriLens — Smart Crop Disease Detection & Forecasting"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  go_router: ^14.8.1
  provider: ^6.1.2
  http: ^1.3.0
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.2
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  flutter_svg: ^2.0.17
  intl: ^0.20.2
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  flutter_markdown: ^0.7.7+1
  flutter_local_notifications: ^18.0.0
  connectivity_plus: ^6.1.5
  url_launcher: ^6.3.1
  package_info_plus: ^8.0.0
  webview_flutter: ^4.10.0
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
    - assets/l10n/
